[package]
name = "chainview"
version = "0.0.1"
edition = "2024"
rust-version = "1.85"
authors = ["Joaquin Bejar <jb@taunais.com>"]
description = "Terminal UI for option chains, Greeks and volatility - real-time market data and backtest replay in your terminal."
license = "MIT"
readme = "README.md"
repository = "https://github.com/joaquinbejar/ChainView"
homepage = "https://github.com/joaquinbejar/ChainView"
keywords = ["finance", "options", "tui", "terminal", "trading"]
categories = ["finance", "command-line-utilities"]
include = ["src/**/*", "Cargo.toml", "README.md", "LICENSE"]

[lib]
name = "chainview"
path = "src/lib.rs"

[[bin]]
name = "chainview"
path = "src/main.rs"

[dependencies]
thiserror = "2"
serde = { version = "1", features = ["derive"] }
toml = "1"
humantime = "2"
clap = { version = "4.5", features = ["derive"] }
dotenvy = "0.15"
optionstratlib = { version = "0.18.0", default-features = false }
chrono = { version = "0.4", default-features = false, features = ["std"] }
async-trait = "0.1"
tokio = { version = "1", default-features = false, features = ["sync"] }

[dev-dependencies]
proptest = "1"

[lints.rust]
warnings = { level = "deny", priority = -1 }
unsafe_code = "deny"
missing_docs = "deny"

[lints.clippy]
all = { level = "deny", priority = -1 }
unwrap_used = "deny"
expect_used = "deny"
indexing_slicing = "deny"
todo = "deny"
unimplemented = "deny"
dbg_macro = "deny"
print_stdout = "deny"
print_stderr = "deny"

[profile.release]
lto = true
codegen-units = 1
